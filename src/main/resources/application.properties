spring.application.name=open-banking
spring.jpa.hibernate.ddl-auto=none
# TODO: move to environment variables before deploying
spring.datasource.url=jdbc:mysql://localhost:3306/mydb
spring.datasource.username=root
spring.datasource.password=rootpass
spring.api.url = open-banking/v4.0/aisp
resilience4j.circuitbreaker.instances.transactionService.sliding-window-size=10
resilience4j.circuitbreaker.instances.transactionService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.transactionService.wait-duration-in-open-state=10s